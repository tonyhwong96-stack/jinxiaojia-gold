<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金小价 - 实时黄金价格</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #0D1117 0%, #161B22 50%, #0D1117 100%);
      color: #E6EDF3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      padding: 40px 0 20px;
    }

    .title {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #8B949E;
    }

    .update-time {
      text-align: right;
      font-size: 12px;
      color: #8B949E;
      padding: 10px 0;
    }

    .card {
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin: 16px 0;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 229, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00E5FF, transparent);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #E6EDF3;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 12px;
      color: #8B949E;
      margin-bottom: 16px;
    }

    .price-main {
      text-align: center;
      padding: 20px 0;
    }

    .price-value {
      font-size: 48px;
      font-weight: 700;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .price-unit {
      font-size: 16px;
      color: #8B949E;
      margin-left: 8px;
    }

    .price-change {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-top: 12px;
    }

    .up {
      color: #FF4D4F;
      text-shadow: 0 0 15px rgba(255, 77, 79, 0.4);
    }

    .down {
      color: #00FF88;
      text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
    }

    .macro-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .macro-item {
      background: rgba(13, 17, 23, 0.5);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .macro-label {
      font-size: 12px;
      color: #8B949E;
      margin-bottom: 8px;
    }

    .macro-value {
      font-size: 24px;
      font-weight: 600;
      color: #00E5FF;
    }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: #8B949E;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0, 229, 255, 0.2);
      border-top-color: #00E5FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .refresh-btn {
      background: linear-gradient(135deg, #00E5FF 0%, #7B2CBF 100%);
      border: none;
      border-radius: 12px;
      padding: 16px 40px;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0, 229, 255, 0.3);
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }

    .refresh-btn:active {
      opacity: 0.8;
    }

    .footer {
      text-align: center;
      padding: 40px 0 20px;
      font-size: 12px;
      color: #6E7681;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">✨ 金小价</div>
      <div class="subtitle">GOLDPRICE · 实时黄金价格</div>
    </div>

    <div class="update-time" id="updateTime">更新时间：--</div>

    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>加载中...</div>
      </div>
    </div>

    <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>

    <div class="footer">
      金小价 · GOLDPRICE
    </div>
  </div>

  <script>
    // 获取实时金价及宏观数据
    async function fetchGoldPrice() {
      console.log('🔄 开始获取数据...');
      
      // 默认数据
      let goldPrice = 4740.00;
      let domesticPrice = 1100.11;
      let dxy = 103.50;
      let treasury = 4.22;
      let fedRateLower = 4.25;
      let fedRateUpper = 4.50;
      let cpi = 3.2;
      
      try {
        // 获取国际金价
        const response = await fetch('https://api.gold-api.com/price/XAU');
        const data = await response.json();
        if (data && data.price) {
          goldPrice = data.price;
          console.log('✅ 金价:', goldPrice);
        }
        
        // 国内金价 = 国际金价 × 汇率 ÷ 31.1035
        const exchangeRate = 7.23;
        const ounceToGram = 31.1035;
        domesticPrice = (goldPrice * exchangeRate / ounceToGram).toFixed(2);
        
      } catch (e) {
        console.log('⚠️ API 失败，使用备用数据');
      }
      
      return {
        gold: { international: goldPrice, domestic: parseFloat(domesticPrice) },
        macro: { dxy, treasury, fedRateLower, fedRateUpper, cpi }
      };
    }

    // 加载数据
    async function loadData() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>加载中...</div>
        </div>
      `;

      const data = await fetchGoldPrice();
      
      const now = new Date();
      const timeStr = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      document.getElementById('updateTime').textContent = `更新时间：${timeStr}`;

      content.innerHTML = `
        <div class="card">
          <div class="card-title">🌍 国际金价</div>
          <div class="card-subtitle">现货黄金</div>
          <div class="price-main">
            <span class="price-value">$${data.gold.international.toFixed(2)}</span>
            <span class="price-unit">/盎司</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">🇨🇳 国内金价</div>
          <div class="card-subtitle">人民币金价</div>
          <div class="price-main">
            <span class="price-value">¥${data.gold.domestic.toFixed(2)}</span>
            <span class="price-unit">/克</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📊 影响金价的关键数据</div>
          <div class="card-subtitle">宏观经济指标</div>
          <div class="macro-grid">
            <div class="macro-item">
              <div class="macro-label">💵 美元指数</div>
              <div class="macro-value">${data.macro.dxy.toFixed(2)}</div>
            </div>
            <div class="macro-item">
              <div class="macro-label">📊 美债收益率 (10Y)</div>
              <div class="macro-value">${data.macro.treasury.toFixed(2)}%</div>
            </div>
            <div class="macro-item">
              <div class="macro-label">🏦 美联储利率</div>
              <div class="macro-value">${data.macro.fedRateLower}-${data.macro.fedRateUpper}%</div>
            </div>
            <div class="macro-item">
              <div class="macro-label">📈 美国 CPI</div>
              <div class="macro-value">${data.macro.cpi.toFixed(1)}%</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">💡 数据说明</div>
          <div class="card-subtitle">如何解读这些数据</div>
          <div style="font-size: 13px; line-height: 1.8; color: #8B949E;">
            <div style="margin-bottom: 8px;">• <strong style="color: #00E5FF">美元指数 ↑</strong> → 通常利空黄金</div>
            <div style="margin-bottom: 8px;">• <strong style="color: #00E5FF">美债收益率 ↑</strong> → 持有黄金机会成本增加</div>
            <div style="margin-bottom: 8px;">• <strong style="color: #00E5FF">美联储利率 ↑</strong> → 通常利空黄金</div>
            <div style="margin-bottom: 8px;">• <strong style="color: #00E5FF">CPI 通胀 ↑</strong> → 通常利好黄金（抗通胀）</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📝 数据来源</div>
          <div class="card-subtitle">数据更新说明</div>
          <div style="font-size: 12px; line-height: 1.8; color: #8B949E;">
            <div style="margin-bottom: 6px;">• <strong>国际金价</strong>：实时 API 获取</div>
            <div style="margin-bottom: 6px;">• <strong>国内金价</strong>：根据国际金价换算</div>
            <div style="margin-bottom: 6px;">• <strong>美元指数/美债收益率</strong>：参考值（每日更新）</div>
            <div style="margin-bottom: 6px;">• <strong>美联储利率/CPI</strong>：官方发布后手动更新</div>
          </div>
        </div>
      `;
    }

    // 页面加载时获取数据
    loadData();
  </script>
</body>
</html>
